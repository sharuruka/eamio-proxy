name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build package
        run: make docker-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: eamio-proxy
          path: |
            out/x64
            out/x86

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: out/eamio-proxy.zip
          body: ""
